server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Safety net for large uploads — videos upload one-per-request, so allow up
    # to the backend's 1 GB per-file limit. (Images are also batched client-side.)
    client_max_body_size 1024m;

    # Proxy API calls to the backend service.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — every non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built static assets aggressively (hashed filenames).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asobu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asobu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-asobu_photos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asobu} -d ${POSTGRES_DB:-asobu_photos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    # Retry the alias until MinIO accepts connections, then create the bucket.
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-photos};
      echo 'Bucket ready';
      exit 0;
      "

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-asobu}:${POSTGRES_PASSWORD:-asobu_secret}@db:5432/${POSTGRES_DB:-asobu_photos}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-photos}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
  miniodata:
